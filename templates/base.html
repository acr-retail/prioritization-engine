<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ACR Prioritization{% endblock %}</title>
    <link rel="shortcut icon" href="/static/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            line-height: 1.5;
        }

        /* Fixed nav */
        nav {
            background: #111;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        nav .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
        }

        nav .brand span { color: #64748b; font-weight: 400; }

        nav .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.15s;
        }

        nav a:hover, nav a.active { color: #fff; }

        nav .user {
            color: #64748b;
            font-size: 0.8rem;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            padding-top: calc(56px + 1rem);
        }

        .container-narrow {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        thead th {
            background: #f8fafc;
            padding: 0.5rem 0.6rem;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        tbody td {
            padding: 0.45rem 0.6rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            white-space: nowrap;
        }

        tbody tr:hover { background: #f8fafc; }
        tbody tr { cursor: pointer; }

        /* Score badge */
        .score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .score-critical { background: #fef2f2; color: #dc2626; }
        .score-high { background: #fff7ed; color: #ea580c; }
        .score-medium { background: #fefce8; color: #ca8a04; }
        .score-low { background: #f0fdf4; color: #16a34a; }

        /* Sortable headers */
        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover { color: #111; }

        th.sortable::after {
            content: ' ↕';
            font-size: 0.7rem;
            color: #cbd5e1;
        }

        th.sortable.sort-asc::after { content: ' ↑'; color: #475569; }
        th.sortable.sort-desc::after { content: ' ↓'; color: #475569; }

        /* Filter row */
        .filter-row th {
            padding: 0.25rem 0.35rem;
            background: #f1f5f9;
        }

        .filter-row select {
            padding: 0.15rem 0.25rem;
            font-size: 0.7rem;
            border: 1px solid #d1d5db;
            border-radius: 3px;
            width: 100%;
            max-width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
        .btn-ghost { background: transparent; color: #475569; border: 1px solid #e2e8f0; }
        .btn-ghost:hover { background: #f1f5f9; }

        /* Forms */
        input, select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: inherit;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #111;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.3rem;
        }

        .form-group { margin-bottom: 1rem; }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-blue { background: #eff6ff; color: #2563eb; }
        .badge-gray { background: #f1f5f9; color: #475569; }
        .badge-green { background: #f0fdf4; color: #16a34a; }
        .badge-yellow { background: #fefce8; color: #ca8a04; }

        /* Error */
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        /* Truncate title column */
        .truncate {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }

        /* Header row */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-top: 1rem;
        }

        .stats { display: flex; gap: 1.5rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-link { cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 6px; transition: background 0.15s; }
        .stat-link:hover { background: #f1f5f9; }
        .stat-link.active { background: #e2e8f0; }

        /* Slide-in detail panel */
        .panel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 200;
        }

        .panel-overlay.open { display: block; }

        .panel {
            position: fixed;
            top: 0;
            right: -60vw;
            width: 60vw;
            min-width: 500px;
            height: 100vh;
            background: #fff;
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            z-index: 201;
            transition: right 0.25s ease;
            overflow-y: auto;
        }

        .panel.open { right: 0; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 700;
        }

        .panel-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: #64748b;
            padding: 0.25rem;
        }

        .panel-close:hover { color: #111; }

        .panel-body { padding: 1.5rem; }

        .panel-field {
            margin-bottom: 1.25rem;
        }

        .panel-field-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .panel-field-value {
            font-size: 0.9rem;
            color: #1a1a1a;
        }

        .panel-score {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .panel-score .score { font-size: 1.2rem; padding: 0.3rem 0.75rem; }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem 1.5rem;
        }

        .panel-input {
            width: 100%;
            padding: 0.4rem 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            font-size: 0.8rem;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s;
        }

        .panel-input:focus {
            outline: none;
            border-color: #111;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
        }

        .panel-input:hover { border-color: #cbd5e1; }

        .panel-tooltip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #64748b;
            font-size: 0.55rem;
            font-weight: 700;
            cursor: help;
            position: relative;
            top: -1px;
            margin-left: 3px;
        }

        .panel-tooltip:hover { background: #cbd5e1; color: #334155; }

        .panel-tooltip:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 0.4rem 0.6rem;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 400;
            white-space: normal;
            width: 200px;
            text-align: left;
            line-height: 1.4;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            margin-bottom: 4px;
        }

        .panel-tooltip:hover::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1a1a1a;
            z-index: 100;
            pointer-events: none;
        }

        /* Loading spinner */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #111;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Bulk edit mode */
        .bulk-mode tr { cursor: pointer; }
        .bulk-mode tr:hover { background: #eff6ff; }
        .bulk-mode tr.selected { background: #eff6ff; }
        .bulk-mode tr.selected:hover { background: #dbeafe; }

        /* ---- Responsive ---- */

        /* Tablet */
        @media (max-width: 1024px) {
            .container { padding: 1rem; padding-top: 56px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .truncate { max-width: 200px; }
            thead th, tbody td { padding: 0.5rem 0.6rem; font-size: 0.8rem; }
            .filter-row input { font-size: 0.7rem; padding: 0.25rem 0.4rem; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            nav { padding: 0 1rem; height: 48px; }
            nav .brand { font-size: 0.95rem; }
            nav .brand span { display: none; }
            nav .user { display: none; }
            nav .nav-links { gap: 1rem; }

            .container { padding: 0.75rem; padding-top: 48px; }

            h1 { font-size: 1.2rem; }
            .subtitle { font-size: 0.75rem; }

            .stats { gap: 1rem; }
            .stat-value { font-size: 1.2rem; }

            .card { border-radius: 4px; }

            /* Table: horizontal scroll */
            table { font-size: 0.75rem; }
            thead th { padding: 0.5rem; top: 48px; }
            tbody td { padding: 0.4rem 0.5rem; }
            .truncate { max-width: 150px; }
            .filter-row th { top: calc(48px + 33px); }

            /* Panel: full width on mobile */
            .panel {
                width: 100%;
                max-width: 100vw;
                min-width: unset;
                right: -100%;
            }
            .panel.open { right: 0; }
            .panel-grid { grid-template-columns: 1fr 1fr; }
            .panel-header { padding: 1rem; }
            .panel-body { padding: 1rem; }
            .panel-score { padding: 0.75rem 1rem; }

            /* Config cards */
            .card table { font-size: 0.8rem; }
        }

        /* Small mobile */
        @media (max-width: 480px) {
            nav .nav-links { gap: 0.75rem; }
            nav a { font-size: 0.8rem; }
            .page-header { margin-bottom: 1rem; }
            .stats { gap: 0.75rem; }
            .stat-value { font-size: 1rem; }
            .stat-label { font-size: 0.6rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <div style="display:flex;align-items:center;gap:1rem;">
            <a href="/backlog" class="brand">ACR <span>Prioritization Engine</span></a>
            {% if login %}<div id="presenceIndicator" style="display:flex;align-items:center;"></div>{% endif %}
        </div>
        <div class="nav-links">
            {% if login %}
            <a href="/backlog" class="{% if active_page == 'backlog' %}active{% endif %}">Backlog</a>
            <a href="/gantt" class="{% if active_page == 'gantt' %}active{% endif %}">Gantt</a>
            <a href="/config" class="{% if active_page == 'config' %}active{% endif %}">Weights</a>
            <span class="user">{{ login }}</span>
            <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% if login %}
    <!-- Shared panel HTML -->
    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="panel" id="detailPanel">
        <div class="panel-header">
            <h2 id="panelTitle">Task Details</h2>
            <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        <div class="panel-score" id="panelScore"></div>
        <div class="panel-body" id="panelBody"></div>
    </div>
    <script src="/static/panel.js"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>
</html>
